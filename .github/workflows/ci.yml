name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-price-review-agent:ci

      - name: Smoke test container
        run: |
          docker run -d --name pva -p 7860:7860 ai-price-review-agent:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/health > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:7860/health | grep -q '"status":"ok"'
          curl -sf http://localhost:7860/scenarios | grep -q '"count"'
          docker stop pva
