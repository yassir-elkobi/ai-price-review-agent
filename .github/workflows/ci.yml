name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-price-review-agent:ci

      - name: Smoke test container
        run: |
          docker run -d --name pva -p 7860:7860 ai-price-review-agent:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/health > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:7860/health | grep -q '"status":"ok"'
          curl -sf http://localhost:7860/scenarios | grep -q '"count"'
          docker stop pva

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          remote="https://yassir-elkobi:${HF_TOKEN}@huggingface.co/spaces/yassir-elkobi/ai-price-review-agent"
          git remote add space "$remote" 2>/dev/null || git remote set-url space "$remote"
          git push space HEAD:main --force

